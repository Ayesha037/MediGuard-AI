services:
  - type: web
    name: mediguard-prediction-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health/live
    envVars:
      - key: API_KEYS
        sync: false          # set a real secret in the Render dashboard
      - key: CORS_ORIGINS
        value: "*"            # tighten to your actual frontend domain(s)
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENVIRONMENT
        value: "production"
