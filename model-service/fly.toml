app = "mediguard-prediction-service"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  LOG_LEVEL = "INFO"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health/live"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Set secrets before first deploy:
#   fly secrets set API_KEYS=your-real-key-here
